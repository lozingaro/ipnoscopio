<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DIDASCOPE</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #39ff14;
    --green-a: rgba(57,255,20,0.15);
    --blue: #00cfff;
    --yellow: #ffdd00;
    --bg: #0a0a0a;
    --panel: #111;
    --border: #1e1e1e;
  }
  html, body { height: 100%; background: var(--bg); color: var(--green); font-family: monospace; }
  body { display: flex; flex-direction: column; padding: 12px 12px 28px; gap: 10px; min-height: 100dvh; overflow-x: hidden; }

  /* header */
  #header { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  #title { font-size: 14px; letter-spacing: 4px; font-weight: 700; }
  #subtitle { font-size: 8px; letter-spacing: 3px; color: #333; margin-left: 10px; }
  #leds { display: flex; gap: 8px; align-items: center; }
  .led-group { display: flex; gap: 4px; align-items: center; }
  .led { width: 6px; height: 6px; border-radius: 50%; background: #1a1a1a; transition: all .3s; }
  .led-label { font-size: 8px; letter-spacing: 1px; color: #333; }

  /* screen */
  #screen-wrap { background: #000; border-radius: 8px; padding: 4px; box-shadow: 0 0 0 1px #1a1a1a; position: relative; flex-shrink: 0; }
  canvas { display: block; width: 100%; height: clamp(160px, 35vw, 300px); border-radius: 4px; }
  #screen-label { position: absolute; top: 8px; left: 10px; font-size: 9px; letter-spacing: 3px; opacity: .5; }
  #mic-warn { position: absolute; top: 8px; right: 10px; font-size: 9px; letter-spacing: 1px; color: #ff4444; display: none; }

  /* controls */
  #controls { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; flex: 1; }

  .section-label { font-size: 9px; letter-spacing: 4px; color: #333; margin-bottom: 2px; }

  /* tab bar */
  .tabbar { display: flex; border-radius: 6px; overflow: hidden; border: 1px solid #2a2a2a; }
  .tabbar button { flex: 1; background: transparent; color: #555; border: none; border-right: 1px solid #1a1a1a; padding: 9px 4px; cursor: pointer; font-size: 11px; letter-spacing: 1px; font-family: monospace; transition: all .15s; -webkit-tap-highlight-color: transparent; }
  .tabbar button:last-child { border-right: none; }
  .tabbar button.active-synth { background: rgba(57,255,20,0.12); color: var(--green); box-shadow: inset 0 -2px 0 var(--green); font-weight: 700; }
  .tabbar button.active-mic  { background: rgba(0,207,255,0.12); color: var(--blue);  box-shadow: inset 0 -2px 0 var(--blue);  font-weight: 700; }

  /* waveform pills */
  #wave-row { display: flex; gap: 4px; }
  .wave-btn { flex: 1; background: transparent; color: #444; border: 1px solid #2a2a2a; border-radius: 4px; padding: 8px 0; cursor: pointer; font-size: 10px; font-family: monospace; transition: all .1s; -webkit-tap-highlight-color: transparent; }
  .wave-btn.active { background: rgba(57,255,20,0.15); color: var(--green); border-color: var(--green); box-shadow: 0 0 6px rgba(57,255,20,.2); }

  /* panel */
  .panel { background: var(--panel); border-radius: 8px; padding: 14px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 13px; }

  /* slider row */
  .slider-row { display: flex; flex-direction: column; gap: 5px; }
  .slider-row.disabled { opacity: .3; pointer-events: none; }
  .slider-meta { display: flex; justify-content: space-between; align-items: baseline; }
  .slider-meta .slabel { font-size: 10px; letter-spacing: 2px; color: #555; }
  .slider-meta .sval   { font-size: 12px; font-family: monospace; font-weight: 600; }
  input[type=range] { width: 100%; height: 20px; cursor: pointer; accent-color: var(--green); }
  input[type=range].blue   { accent-color: var(--blue); }
  input[type=range].yellow { accent-color: var(--yellow); }
  input[type=range].grey   { accent-color: #555; }

  /* transport */
  #transport { display: flex; gap: 8px; }
  #btn-run { flex: 2; background: transparent; color: var(--green); border: 1px solid var(--green); border-radius: 6px; padding: 13px; cursor: pointer; font-size: 12px; letter-spacing: 3px; font-family: monospace; transition: all .15s; -webkit-tap-highlight-color: transparent; }
  #btn-run.stopped { background: var(--green); color: #000; box-shadow: 0 0 12px rgba(57,255,20,.4); }
  #btn-clr { flex: 1; background: transparent; color: #444; border: 1px solid #222; border-radius: 6px; padding: 13px; cursor: pointer; font-size: 12px; letter-spacing: 3px; font-family: monospace; -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div>
    <span id="title">DIDASCOPE</span>
    <span id="subtitle">DS-2M</span>
  </div>
  <div id="leds">
    <div class="led-group"><div class="led" id="led-run"></div><span class="led-label">RUN</span></div>
    <div class="led-group"><div class="led" id="led-mic"></div><span class="led-label">MIC</span></div>
  </div>
</div>

<!-- Screen -->
<div id="screen-wrap">
  <canvas id="scope"></canvas>
  <div id="screen-label">● SYNTH</div>
  <div id="mic-warn">HTTPS NEEDED</div>
</div>

<!-- Controls -->
<div id="controls">

  <!-- Source -->
  <div>
    <div class="section-label">INPUT SOURCE</div>
    <div class="tabbar">
      <button id="tab-synth" class="active-synth" onclick="switchSrc('synth')">SYNTH</button>
      <button id="tab-mic"   onclick="switchSrc('mic')">MIC 🎤</button>
    </div>
  </div>

  <!-- Waveform (shown only for synth) -->
  <div id="wave-section">
    <div id="wave-row">
      <button class="wave-btn active" data-w="sine"     onclick="setWave(this)">SIN</button>
      <button class="wave-btn"        data-w="square"   onclick="setWave(this)">SQR</button>
      <button class="wave-btn"        data-w="sawtooth" onclick="setWave(this)">SAW</button>
      <button class="wave-btn"        data-w="triangle" onclick="setWave(this)">TRI</button>
    </div>
  </div>

  <!-- Signal panel -->
  <div class="panel" id="signal-panel">
    <div class="section-label">SIGNAL</div>

    <div class="slider-row" id="row-freq">
      <div class="slider-meta">
        <span class="slabel">FREQUENCY</span>
        <span class="sval" id="v-freq" style="color:var(--green)">2.0 Hz</span>
      </div>
      <input type="range" id="sl-freq" min="0.2" max="10" step="0.1" value="2">
    </div>

    <div class="slider-row" id="row-amp">
      <div class="slider-meta">
        <span class="slabel">AMPLITUDE</span>
        <span class="sval" id="v-amp" style="color:var(--green)">0.75</span>
      </div>
      <input type="range" id="sl-amp" min="0" max="1" step="0.01" value="0.75">
    </div>

    <div class="slider-row disabled" id="row-gain">
      <div class="slider-meta">
        <span class="slabel">MIC GAIN</span>
        <span class="sval" id="v-gain" style="color:var(--blue)">×2.0</span>
      </div>
      <input type="range" class="blue" id="sl-gain" min="0.1" max="10" step="0.1" value="2">
    </div>

    <div class="slider-row">
      <div class="slider-meta">
        <span class="slabel">Y OFFSET</span>
        <span class="sval" id="v-yoff" style="color:var(--green)">0.00</span>
      </div>
      <input type="range" id="sl-yoff" min="-2" max="2" step="0.1" value="0">
    </div>
  </div>

  <!-- Timebase panel -->
  <div class="panel">
    <div class="section-label">TIMEBASE · TRIGGER</div>

    <div class="slider-row">
      <div class="slider-meta">
        <span class="slabel">TIME / DIV</span>
        <span class="sval" id="v-time" style="color:var(--green)">1.0×</span>
      </div>
      <input type="range" id="sl-time" min="0.2" max="4" step="0.1" value="1">
    </div>

    <div class="slider-row">
      <div class="slider-meta">
        <span class="slabel">TRIGGER LVL</span>
        <span class="sval" id="v-trig" style="color:var(--yellow)">0.00</span>
      </div>
      <input type="range" class="yellow" id="sl-trig" min="-1" max="1" step="0.05" value="0">
    </div>

    <div class="slider-row">
      <div class="slider-meta">
        <span class="slabel">NOISE</span>
        <span class="sval" id="v-noise" style="color:#555">0.020</span>
      </div>
      <input type="range" class="grey" id="sl-noise" min="0" max="0.2" step="0.005" value="0.02">
    </div>
  </div>

  <!-- Transport -->
  <div id="transport">
    <button id="btn-run" onclick="toggleRun()">■&nbsp;&nbsp;STOP</button>
    <button id="btn-clr" onclick="clearScreen()">CLR</button>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const state = {
  src: "synth", waveform: "sine",
  freq: 2, amp: 0.75, gain: 2, yOff: 0,
  timebase: 1, trig: 0, noise: 0.02,
  running: true, micOk: false,
};

// ── Waveforms ──────────────────────────────────────────────────────────────
const WF = {
  sine:     t => Math.sin(2 * Math.PI * t),
  square:   t => Math.sign(Math.sin(2 * Math.PI * t)),
  sawtooth: t => 2 * (t - Math.floor(t + 0.5)),
  triangle: t => 2 * Math.abs(2 * (t - Math.floor(t + 0.5))) - 1,
};

function findTrigger(buf, level, hyst = 0.02) {
  for (let i = 1; i < buf.length - 1; i++)
    if (buf[i - 1] < level - hyst && buf[i] >= level) return i;
  return 0;
}

// ── Canvas ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById("scope");
const ctx    = canvas.getContext("2d");
let offscreen, offCtx, W, H;

function initCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  W = Math.round(rect.width  * dpr);
  H = Math.round(rect.height * dpr);
  canvas.width  = W;
  canvas.height = H;
  offscreen = document.createElement("canvas");
  offscreen.width = W; offscreen.height = H;
  offCtx = offscreen.getContext("2d");
  offCtx.fillStyle = "#000";
  offCtx.fillRect(0, 0, W, H);
}

function drawGrid() {
  const cols = 10, rows = 8;
  for (let i = 0; i <= cols; i++) {
    ctx.strokeStyle = i === 5 ? "rgba(57,255,20,0.28)" : "rgba(57,255,20,0.13)";
    ctx.lineWidth   = i === 5 ? 1 : 0.5;
    ctx.beginPath(); ctx.moveTo((i/cols)*W, 0); ctx.lineTo((i/cols)*W, H); ctx.stroke();
  }
  for (let j = 0; j <= rows; j++) {
    ctx.strokeStyle = j === 4 ? "rgba(57,255,20,0.28)" : "rgba(57,255,20,0.13)";
    ctx.lineWidth   = j === 4 ? 1 : 0.5;
    ctx.beginPath(); ctx.moveTo(0, (j/rows)*H); ctx.lineTo(W, (j/rows)*H); ctx.stroke();
  }
}

function strokePts(c, pts, color, blur, lw) {
  if (pts.length < 2) return;
  c.shadowBlur = blur; c.shadowColor = color; c.strokeStyle = color; c.lineWidth = lw;
  c.beginPath(); pts.forEach(([x,y],i) => i ? c.lineTo(x,y) : c.moveTo(x,y)); c.stroke();
  c.shadowBlur = 0;
}

// ── Points generation ──────────────────────────────────────────────────────
let t0 = 0;
function synthPts() {
  const n = Math.min(W * 2, 1440);
  const margin = H / 2 - 8;
  return Array.from({length: n + 1}, (_, i) => {
    const t = (i/n) * state.timebase + t0 * state.freq * 0.0001;
    const y = WF[state.waveform](t * state.freq) * state.amp + (Math.random()-.5) * state.noise * 2;
    return [(i/n)*W, H/2 - y*margin + state.yOff*(H/8)];
  });
}

function micPts() {
  if (!analyser || !micBuf) return [];
  analyser.getFloatTimeDomainData(micBuf);
  const off2  = findTrigger(micBuf, state.trig);
  const win   = Math.min(Math.floor(1024 * state.timebase), micBuf.length - off2);
  if (win < 2) return [];
  const margin = H / 2 - 8;
  return Array.from({length: win}, (_, i) => {
    const y = micBuf[off2+i] * state.gain + (Math.random()-.5) * state.noise * 2;
    return [(i/(win-1))*W, H/2 - y*margin + state.yOff*(H/8)];
  });
}

// ── Render loop ────────────────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  if (!state.running || !offCtx) return;
  t0 = ts;

  offCtx.fillStyle = "rgba(0,0,0,0.22)";
  offCtx.fillRect(0, 0, W, H);

  const pts = state.src === "mic" ? micPts() : synthPts();
  strokePts(offCtx, pts, "rgba(57,255,20,0.15)", 0, 5);
  strokePts(offCtx, pts, "#39ff14", 6, 1.5);

  // trigger line
  const ty = H/2 - state.trig*(H/2-8);
  offCtx.strokeStyle="rgba(255,220,0,0.3)"; offCtx.lineWidth=1; offCtx.setLineDash([3,6]);
  offCtx.beginPath(); offCtx.moveTo(0,ty); offCtx.lineTo(W,ty); offCtx.stroke();
  offCtx.setLineDash([]);

  // composite
  ctx.fillStyle = "#000"; ctx.fillRect(0, 0, W, H);
  ctx.drawImage(offscreen, 0, 0);
  drawGrid();

  // scanlines
  for (let y = 0; y < H; y += Math.max(2, H/180)) {
    ctx.fillStyle = "rgba(0,0,0,0.06)"; ctx.fillRect(0, y, W, 1);
  }
  // vignette
  const vg = ctx.createRadialGradient(W/2, H/2, H*.2, W/2, H/2, H*.8);
  vg.addColorStop(0, "transparent"); vg.addColorStop(1, "rgba(0,0,0,0.6)");
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
}

// ── Mic ────────────────────────────────────────────────────────────────────
let analyser = null, micBuf = null, stream = null, actx = null;

async function startMic() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
      video: false
    });
    actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === "suspended") await actx.resume();
    analyser = actx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0;
    actx.createMediaStreamSource(stream).connect(analyser);
    micBuf = new Float32Array(2048);
    state.micOk = true;
    updateMicUI(true);
    return true;
  } catch(e) {
    console.warn("Mic:", e);
    state.micOk = false;
    updateMicUI(false);
    document.getElementById("mic-warn").style.display = "block";
    return false;
  }
}

function stopMic() {
  stream?.getTracks().forEach(t => t.stop());
  actx?.close();
  analyser = null; micBuf = null; stream = null; actx = null;
  state.micOk = false;
  updateMicUI(false);
}

function updateMicUI(ok) {
  const led = document.getElementById("led-mic");
  led.style.background = ok ? "var(--blue)" : "#1a1a1a";
  led.style.boxShadow  = ok ? "0 0 4px var(--blue)" : "none";
  document.getElementById("mic-warn").style.display = "none";
}

// ── Source switch ──────────────────────────────────────────────────────────
async function switchSrc(val) {
  if (val === "mic") {
    const ok = await startMic();
    if (!ok) return;
  } else {
    stopMic();
  }
  state.src = val;

  // tabs
  document.getElementById("tab-synth").className = val === "synth" ? "active-synth" : "";
  document.getElementById("tab-mic").className   = val === "mic"   ? "active-mic"   : "";

  // show/hide synth controls
  document.getElementById("wave-section").style.display = val === "synth" ? "block" : "none";
  document.getElementById("row-freq").classList.toggle("disabled", val === "mic");
  document.getElementById("row-amp").classList.toggle("disabled",  val === "mic");
  document.getElementById("row-gain").classList.toggle("disabled", val === "synth");

  document.getElementById("screen-label").textContent = val === "mic" ? "● MIC" : "● " + state.waveform.toUpperCase();
}

// ── Waveform ───────────────────────────────────────────────────────────────
function setWave(btn) {
  document.querySelectorAll(".wave-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  state.waveform = btn.dataset.w;
  document.getElementById("screen-label").textContent = "● " + state.waveform.toUpperCase();
}

// ── Sliders ────────────────────────────────────────────────────────────────
function bind(id, valId, key, fmt) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener("input", () => {
    state[key] = parseFloat(sl.value);
    vl.textContent = fmt(state[key]);
  });
}

bind("sl-freq",  "v-freq",  "freq",     v => v.toFixed(1) + " Hz");
bind("sl-amp",   "v-amp",   "amp",      v => v.toFixed(2));
bind("sl-gain",  "v-gain",  "gain",     v => "×" + v.toFixed(1));
bind("sl-yoff",  "v-yoff",  "yOff",     v => (v>=0?"+":"")+v.toFixed(1));
bind("sl-time",  "v-time",  "timebase", v => v.toFixed(1) + "×");
bind("sl-trig",  "v-trig",  "trig",     v => v.toFixed(2));
bind("sl-noise", "v-noise", "noise",    v => v.toFixed(3));

// ── Transport ──────────────────────────────────────────────────────────────
function toggleRun() {
  state.running = !state.running;
  const btn = document.getElementById("btn-run");
  btn.textContent = state.running ? "■\u00a0\u00a0STOP" : "▶\u00a0\u00a0RUN";
  btn.classList.toggle("stopped", !state.running);
  const led = document.getElementById("led-run");
  led.style.background = state.running ? "var(--green)" : "#1a1a1a";
  led.style.boxShadow  = state.running ? "0 0 4px var(--green)" : "none";
}

function clearScreen() {
  if (offCtx) { offCtx.fillStyle="#000"; offCtx.fillRect(0,0,W,H); }
}

// ── Init ───────────────────────────────────────────────────────────────────
window.addEventListener("load", () => {
  initCanvas();

  // led run on
  const led = document.getElementById("led-run");
  led.style.background = "var(--green)";
  led.style.boxShadow  = "0 0 4px var(--green)";

  // resize
  const ro = new ResizeObserver(() => initCanvas());
  ro.observe(canvas);

  requestAnimationFrame(loop);
});
</script>
</body>
</html>
